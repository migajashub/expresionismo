name: Generate HTML from PHP

on:
  push:
    branches:
      - main # Trigger on pushes to the main branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup PHP
      # Use the shivammathur/setup-php action to install PHP
      uses: [shivammathur/setup-php](https://github.com/shivammathur/setup-php)@v2
      with:
        php-version: '8.1' # Specify your required PHP version

    - name: Run PHP script to generate HTML
      # Execute your PHP script, piping the output to an HTML file
      run: php generate_page.php > index.html

    - name: Commit and push generated HTML
      # Use a specific action to commit the changes and push them back
      uses: [ad-m/github-push-action](https://github.com)@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: main # Or another branch like gh-pages
        # Add the generated file to the commit
        commit_message: "Generated static HTML from PHP script"
        force: true # Use force if overwriting the same file regularly
